name: auto-douyin-jianying-compose
description: 抖音科普剪映 UI 自动合成 — 导入 N 段 mp4、字幕、活力科普配音。
skills:
  - auto-douyin-jianying-compose
instruction: |
  【重要】项目根目录：__REPO_ROOT__（clone 路径任意）。禁止说「没有现成脚本」。

  斜杠命令：/auto-douyin-jianying-compose
  完整 SKILL：__REPO_ROOT__/skills/auto-douyin-jianying-compose/SKILL.md

  前置：VideoDir 内 N 个 mp4（01…{N}）；prompts.json 含 narration_script。

  cd __REPO_ROOT__
  powershell -ExecutionPolicy Bypass -File douyin-kepu-flow\run_jianying_compose.ps1 `
    -PromptsFile "douyin-kepu-flow\prompts\{slug}\prompts.json" `
    -VideoDir "D:\douyin-videos\{中文topic}"

  VideoDir 路径每台机器可在 .env 或命令行指定绝对路径。
