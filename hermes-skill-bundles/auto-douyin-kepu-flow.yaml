name: auto-douyin-kepu-flow
description: 抖音一分钟科普 — 选题、N段Flow prompt（16:9）、Playwright批量提交+监听百分比+720p下载。
skills:
  - auto-douyin-kepu-flow
instruction: |
  【重要】项目根目录：__REPO_ROOT__（clone 路径任意）。禁止说「没有现成脚本」。

  斜杠命令：/auto-douyin-kepu-flow
  完整 SKILL：__REPO_ROOT__/skills/auto-douyin-kepu-flow/SKILL.md

  三阶段（严格按顺序，等用户确认后再进入下一阶段）：

  1. 选题：读 topic-rules.md，输出 5–8 条，等用户选序号
  2. Prompt：读 prompt-template.md，生成 **N 段**（常见 8–12）、**16:9**，写入
     __REPO_ROOT__/douyin-kepu-flow/prompts/{slug}/prompts.json
     及 editing_guide.md、narration_script.txt，等用户确认
  3. 批处理+监听+下载（用户确认后，直到全部下载完才结束）：
     cd __REPO_ROOT__
     powershell -ExecutionPolicy Bypass -File douyin-kepu-flow\run_batch.ps1 -PromptsFile "douyin-kepu-flow\prompts\{slug}\prompts.json"

  N = len(prompts.json.segments)。下载目录见 .env 的 FLOW_DOWNLOAD_DIR（默认 D:\douyin-videos\{topic}\）。
  监听：tile 仍显示百分比则继续等；百分比消失且 video 有 src 才 720p 下载。
  新机器：copy .env.example .env 后运行 hermes-skill-bundles\deploy.ps1

  阶段 4（可选）— 剪映合成：/auto-douyin-jianying-compose
